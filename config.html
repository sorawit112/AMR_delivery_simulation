<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMR Simulation Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Simulation Settings</h1>
        <div class="controls">
            <a href="index.html" class="nav-link"><span>←</span> Back to Dashboard</a>
        </div>
    </header>

    <div class="main-grid">
        <div class="panel config-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div class="panel-title">Configuration Settings</div>
                <div class="stream-editor-toggle">
                    <button id="btn-edit-engine">Engine Stream</button>
                    <button id="btn-edit-transmission">Transmission Stream</button>
                </div>
            </div>
            <div class="panel-title" style="margin-top: 1rem;">Travel Time Configuration (Seconds)</div>
            <table id="config-table">
                <thead>
                    <tr>
                        <th>From \ To</th>
                        <th>POF-A</th>
                        <th>POF-B</th>
                        <th>MP1</th>
                        <th>MP2</th>
                        <th>MP3</th>
                        <th>MP4</th>
                        <th>W1</th>
                        <th>HOME-P</th>
                        <th>HOME-M</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 2rem; font-size: 0.875rem;">
                <div>Pick/Place Duration: <input type="number" id="cfg-action-time" value="30"> s</div>
                <div>POF Cycle Time: <input type="number" id="cfg-pof-time" value="600"> s</div>
                <div>MP Cycle Time: <input type="number" id="cfg-mp-time" value="900"> s</div>
            </div>
            <div style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <button id="btn-reset" style="background: var(--danger);">Reset to Defaults</button>
                <button id="btn-save" class="active">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        const ENGINE_TRAVEL_TIMES = {
            'HOME-POF': { 'POF-A': 90, 'POF-B': 100 },
            'POF-A': { 'MP1': 245, 'MP2': 264, 'MP3': 191, 'MP4': 184, 'HOME-POF': 190 },
            'POF-B': { 'MP1': 240, 'MP2': 260, 'MP3': 185, 'MP4': 180, 'HOME-POF': 190 },
            'MP1': { 'W1': 175, 'MP2': 36 },
            'MP2': { 'W1': 176, 'MP3': 123 },
            'MP3': { 'W1': 188, 'MP4': 30 },
            'MP4': { 'W1': 215, 'MP1': 95 },
            'W1': { 'POF-A': 90, 'POF-B': 85 }
        };

        const TRANS_TRAVEL_TIMES = {
            'HOME-POF': { 'POF-A': 60, 'POF-B': 60 },
            'POF-A': { 'MP1': 237, 'MP2': 246, 'MP3': 246, 'MP4': 250, 'HOME-POF': 75 },
            'POF-B': { 'MP1': 232, 'MP2': 240, 'MP3': 240, 'MP4': 245, 'HOME-POF': 75 },
            'MP1': { 'W1': 334, 'MP2': 22 },
            'MP2': { 'W1': 343, 'MP3': 123 },
            'MP3': { 'W1': 246, 'MP4': 30 },
            'MP4': { 'W1': 371, 'MP1': 95 },
            'W1': { 'POF-A': 70, 'POF-B': 75 }
        };

        const DEFAULTS = {
            engine: {
                actionTime: 60,
                pofCycleTime: 600,
                mpCycleTime: 420,
                travelTimes: JSON.parse(JSON.stringify(ENGINE_TRAVEL_TIMES))
            },
            transmission: {
                actionTime: 60,
                pofCycleTime: 600,
                mpCycleTime: 420,
                travelTimes: JSON.parse(JSON.stringify(TRANS_TRAVEL_TIMES))
            }
        };

        let currentEditingStream = 'engine';
        let configs = {
            engine: JSON.parse(localStorage.getItem('amr_sim_config_engine')) ||
                JSON.parse(localStorage.getItem('amr_sim_config')) ||
                JSON.parse(JSON.stringify(DEFAULTS.engine)),
            transmission: JSON.parse(localStorage.getItem('amr_sim_config_transmission')) ||
                JSON.parse(JSON.stringify(DEFAULTS.transmission))
        };

        // Auto-save logic: ensure both configurations exist in localStorage
        if (!localStorage.getItem('amr_sim_config_engine')) {
            localStorage.setItem('amr_sim_config_engine', JSON.stringify(configs.engine));
        }
        if (!localStorage.getItem('amr_sim_config_transmission')) {
            localStorage.setItem('amr_sim_config_transmission', JSON.stringify(configs.transmission));
        }


        function initConfigTable() {
            const config = configs[currentEditingStream];
            const tbody = document.querySelector('#config-table tbody');
            const stations = ['POF-A', 'POF-B', 'MP1', 'MP2', 'MP3', 'MP4', 'W1', 'HOME-POF', 'HOME-MP'];
            tbody.innerHTML = '';
            stations.forEach(from => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td style="font-weight: 600;">${from}</td>` + stations.map(to => {
                    if (from === to) return `<td>-</td>`;
                    const val = (config.travelTimes[from] && config.travelTimes[from][to]) || null;
                    if (!config.travelTimes[from]) config.travelTimes[from] = {};
                    if (val === null) {
                        return `<td>-</td>`;
                    } else {
                        config.travelTimes[from][to] = val;
                    }
                    return `<td><input type="number" data-from="${from}" data-to="${to}" value="${val}"></td>`;
                }).join('');
                tbody.appendChild(tr);
            });

            document.getElementById('cfg-action-time').value = config.actionTime;
            document.getElementById('cfg-pof-time').value = config.pofCycleTime;
            document.getElementById('cfg-mp-time').value = config.mpCycleTime;

            // Update tab UI
            document.getElementById('btn-edit-engine').classList.toggle('active', currentEditingStream === 'engine');
            document.getElementById('btn-edit-transmission').classList.toggle('active', currentEditingStream === 'transmission');
        }

        function saveCurrentInputs() {
            const config = configs[currentEditingStream];
            const inputs = document.querySelectorAll('#config-table input');
            inputs.forEach(input => {
                const { from, to } = input.dataset;
                if (!config.travelTimes[from]) config.travelTimes[from] = {};
                config.travelTimes[from][to] = parseInt(input.value);
            });

            config.actionTime = parseInt(document.getElementById('cfg-action-time').value);
            config.pofCycleTime = parseInt(document.getElementById('cfg-pof-time').value);
            config.mpCycleTime = parseInt(document.getElementById('cfg-mp-time').value);
        }

        function saveConfig() {
            saveCurrentInputs();
            localStorage.setItem(`amr_sim_config_${currentEditingStream}`, JSON.stringify(configs[currentEditingStream]));
            alert(`${currentEditingStream.charAt(0).toUpperCase() + currentEditingStream.slice(1)} configuration saved!`);
        }

        function resetDefaults() {
            if (confirm(`Are you sure you want to reset ${currentEditingStream} settings to defaults?`)) {
                configs[currentEditingStream] = JSON.parse(JSON.stringify(DEFAULTS[currentEditingStream]));
                initConfigTable();
                localStorage.setItem(`amr_sim_config_${currentEditingStream}`, JSON.stringify(configs[currentEditingStream]));
            }
        }

        window.onload = () => {
            initConfigTable();
            document.getElementById('btn-save').onclick = saveConfig;
            document.getElementById('btn-reset').onclick = resetDefaults;

            document.getElementById('btn-edit-engine').onclick = () => {
                saveCurrentInputs();
                currentEditingStream = 'engine';
                initConfigTable();
            };
            document.getElementById('btn-edit-transmission').onclick = () => {
                saveCurrentInputs();
                currentEditingStream = 'transmission';
                initConfigTable();
            };
        };
    </script>
</body>

</html>
